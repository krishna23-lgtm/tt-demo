spring:
  application:
    name: techtankDemo
  data:
    mongodb:
      uri: mongodb://admin:admin@localhost:27017/msp?authSource=admin
      auto-index-creation: false
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080

logging:
  level:
    org.springframework.web.socket: INFO
    org.springframework.data.mongodb.core.MongoTemplate: INFO
